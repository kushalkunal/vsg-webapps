services:
  - type: web
    name: vsg-frontend
    runtime: static
    buildCommand: bun install && bun run build
    staticPublishPath: ./dist/client
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set manually in Render dashboard: https://your-backend.onrender.com/api
      - key: VITE_DEFAULT_TENANT_ID
        sync: false          # Optional: default tenant slug for local dev
      - key: VITE_WHATSAPP_NUMBER
        value: "919521412485"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
